name: Deploy to GPU Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Pull, build, restart
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy to Vast.ai GPU server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DEEPGRAM_API_KEY,OPENAI_API_KEY,ELEVENLABS_API_KEY,DEEPSEEK_API_KEY,TWILIO_ACCOUNT_SID,TWILIO_AUTH_TOKEN
          script: |
            export PATH=/usr/bin:/opt/nvm/versions/node/v24.12.0/bin:/opt/instance-tools/bin:$PATH
            cd /opt/voiceserver

            echo "--- Syncing API keys from secrets ---"
            update_env() {
              local key="$1" val="$2"
              if [ -n "$val" ]; then
                if grep -q "^${key}=" .env 2>/dev/null; then
                  sed -i "s|^${key}=.*|${key}=${val}|" .env
                else
                  echo "${key}=${val}" >> .env
                fi
                echo "  ${key}=***set***"
              fi
            }
            update_env "DEEPGRAM_API_KEY" "$DEEPGRAM_API_KEY"
            update_env "OPENAI_API_KEY" "$OPENAI_API_KEY"
            update_env "ELEVENLABS_API_KEY" "$ELEVENLABS_API_KEY"
            update_env "DEEPSEEK_API_KEY" "$DEEPSEEK_API_KEY"
            update_env "TWILIO_ACCOUNT_SID" "$TWILIO_ACCOUNT_SID"
            update_env "TWILIO_AUTH_TOKEN" "$TWILIO_AUTH_TOKEN"

            echo "--- Pulling latest from GitHub ---"
            git pull origin main

            echo "--- Installing dependencies ---"
            npm install

            echo "--- Building TypeScript ---"
            npm run build

            echo "--- Restarting voiceserver ---"
            pm2 restart voiceserver --update-env

            echo "--- Verifying deploy ---"
            sleep 3
            pm2 list
            COMMIT=$(git log --oneline -1)
            echo "Deployed commit: $COMMIT"
        env:
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
